services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: taskmanagement-db
    environment:
      SA_PASSWORD: "TaskMgmt@2026"
      ACCEPT_EULA: "Y"
      MSSQL_PID: "Express"
    ports:
      - "1433:1433"
    volumes:
      - sqldata:/var/opt/mssql
    healthcheck:
      test: ["CMD", "/opt/mssql-tools18/bin/sqlcmd", "-S", "localhost", "-U", "sa", "-P", "TaskMgmt@2026", "-Q", "SELECT 1", "-No"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: taskmanagement-api
    ports:
      - "8080:8080"
    environment:
      ConnectionStrings__DefaultConnection: "Server=db;Database=TaskManagementDB;User ID=sa;Password=TaskMgmt@2026;TrustServerCertificate=True;"
      FileStorage__UploadPath: "/app/Uploads"
    volumes:
      - uploads:/app/Uploads
    depends_on:
      db:
        condition: service_healthy

volumes:
  sqldata:
  uploads:
